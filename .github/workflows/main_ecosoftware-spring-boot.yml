name: Build and deploy JAR app to Azure Web App - EcoSoftware-spring-boot

on:
  push:
    branches:
      - main
  workflow_dispatch:
  
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn clean install -DskipTests        
        working-directory: Scrum6/Scrum6

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: Scrum6/Scrum6/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_86E98F1943E542CBB0D8B2E9D5C8AC4C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_261FF93898B24D44BC2ADC00B7E1E515 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1B6A912E366B4054B0818DA4903E2C79 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: EcoSoftware-spring-boot
          package: '*.jar'
