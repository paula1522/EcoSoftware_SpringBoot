# =====================================================
# CONFIGURACIÓN GENERAL DE LA APLICACIÓN
# =====================================================
spring.application.name=Scrum6
server.port=8082

# =====================================================
# BASE DE DATOS - POSTGRESQL (Azure)
# =====================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# CONFIGURACIÓN DE GEOCODING
# =====================================================
app.geocoding.nominatim-url=${GEOCODING_NOMINATIM_URL}
app.geocoding.mapsco-url=${GEOCODING_MAPSCO_URL}
app.geocoding.user-agent=${GEOCODING_USER_AGENT}
app.geocoding.email=${GEOCODING_EMAIL}

# =====================================================
# CONFIGURACIÓN CORS
# =====================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# =====================================================
# API EXTERNA - GNEWS
# =====================================================
gnews.api.url=${GNEWS_API_URL}
gnews.api.key=${GNEWS_API_KEY}

# =====================================================
# CLOUDINARY
# =====================================================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# =====================================================
# CONFIGURACIÓN DE CORREO (GMAIL SMTP)
# =====================================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}
